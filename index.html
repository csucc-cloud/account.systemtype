<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/css/style.css">
    <title>OAS | Organization Automated System</title>
    </head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div id="app" class="flex min-h-screen">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-[#000080] text-white transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col shadow-2xl">
            <div class="p-6 text-xl font-bold border-b border-blue-900 flex items-center gap-3">
                <i data-lucide="layout-grid" class="text-blue-300"></i>
                <span>OAS SYSTEM</span>
            </div>
            
            <nav class="flex-1 p-4 space-y-2 mt-4">
                <button onclick="window.showSection('dashboard')" class="nav-item active w-full flex items-center p-3 rounded-2xl hover:bg-white/10 transition-all gap-3">
                    <i data-lucide="home" class="w-5 h-5"></i> Dashboard
                </button>
                <button onclick="window.showSection('students')" class="nav-item w-full flex items-center p-3 rounded-2xl hover:bg-white/10 transition-all gap-3">
                    <i data-lucide="users" class="w-5 h-5"></i> Students
                </button>
                <button onclick="window.showSection('events')" class="nav-item w-full flex items-center p-3 rounded-2xl hover:bg-white/10 transition-all gap-3">
                    <i data-lucide="calendar" class="w-5 h-5"></i> Events
                </button>
                <button onclick="window.showSection('finance')" class="nav-item w-full flex items-center p-3 rounded-2xl hover:bg-white/10 transition-all gap-3">
                    <i data-lucide="banknote" class="w-5 h-5"></i> Finance
                </button>
                <button onclick="window.showSection('attendance')" class="nav-item w-full flex items-center p-3 rounded-2xl hover:bg-white/10 transition-all gap-3">
                    <i data-lucide="user-check" class="w-5 h-5"></i> Attendance
                </button>
            </nav>

            <div class="p-4 border-t border-blue-900">
                <div id="org-badge" class="bg-blue-900/50 p-3 rounded-xl text-xs flex flex-col gap-1">
                    <span class="text-blue-300 uppercase tracking-widest font-bold">Organization</span>
                    <span id="display-org-name" class="text-white truncate italic text-sm">Loading...</span>
                </div>
                <button class="mt-4 w-full flex items-center p-3 text-red-300 hover:text-red-100 transition-colors gap-3">
                    <i data-lucide="log-out" class="w-5 h-5"></i> Logout
                </button>
            </div>
        </aside>

        <main class="flex-1 lg:ml-64 min-h-screen flex flex-col">
            <header class="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-6 sticky top-0 z-40">
                <button id="mobile-menu-btn" class="lg:hidden p-2 text-slate-600">
                    <i data-lucide="menu"></i>
                </button>
                <h2 id="current-page-title" class="text-lg font-bold text-[#000080]">Dashboard</h2>
                <div class="flex items-center gap-4">
                    <div class="hidden md:block text-right">
                        <p id="user-full-name" class="text-sm font-semibold leading-none">Admin User</p>
                        <p class="text-[10px] text-slate-400 uppercase">System Manager</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-slate-200 border-2 border-white shadow-sm overflow-hidden">
                        <img src="https://ui-avatars.com/api/?name=Admin&background=000080&color=fff" alt="Avatar">
                    </div>
                </div>
            </header>

            <div id="content-viewport" class="p-6 space-y-6">
                <section id="section-dashboard" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div class="bg-white p-6 rounded-[32px] shadow-sm border border-slate-100 flex items-center gap-4">
                            <div class="p-3 bg-blue-50 text-[#000080] rounded-2xl"><i data-lucide="users"></i></div>
                            <div>
                                <p class="text-sm text-slate-500">Total Students</p>
                                <h3 id="stat-total-students" class="text-2xl font-black">0</h3>
                            </div>
                        </div>
                        </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="bg-white p-8 rounded-[32px] shadow-sm border border-slate-100 min-h-[350px]">
                            <h4 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-6">Attendance Overview</h4>
                            <div class="h-64 relative">
                                <canvas id="attendanceChart"></canvas>
                            </div>
                        </div>
                        <div class="bg-white p-8 rounded-[32px] shadow-sm border border-slate-100 min-h-[350px]">
                            <h4 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-6">Student Distribution</h4>
                            <div class="h-64 relative">
                                <canvas id="deptChart"></canvas>
                            </div>
                        </div>
                    </div>
                </section>

                <section id="section-students" class="hidden">
                    <div class="bg-white rounded-[32px] shadow-sm border border-slate-100 overflow-hidden">
                        <div class="p-6 border-b border-slate-50 flex flex-wrap justify-between gap-4">
                            <input type="text" placeholder="Search students..." class="px-4 py-2 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-[#000080]/20 w-full max-w-xs">
                            <button class="bg-[#000080] text-white px-6 py-2 rounded-xl font-bold hover:shadow-lg transition-shadow">Add Student</button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="bg-slate-50/50 text-slate-400 text-[10px] uppercase tracking-tighter">
                                    <tr>
                                        <th class="px-6 py-4">Name</th>
                                        <th class="px-6 py-4">Department</th>
                                        <th class="px-6 py-4">Status</th>
                                    </tr>
                                </thead>
                                <tbody id="student-list-body"></tbody>
                            </table>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script type="module" src="/src/js/main.js"></script>
</body>
</html>
