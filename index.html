<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAS | LSG & Org System</title>
    <link rel="stylesheet" href="./src/css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 antialiased">

    <div id="auth-screen" class="fixed inset-0 z-[200] flex items-center justify-center p-6 transition-all duration-700">
        <div class="absolute inset-0 z-0 overflow-hidden">
            <div class="absolute inset-0 bg-[#000080]"></div>
            <img src="/assets/img/balangay-bg.png" alt="Background" class="absolute inset-0 w-full h-full object-cover opacity-40 blur-[8px] scale-110">
            <div class="absolute inset-0 bg-gradient-to-t from-[#000080] via-transparent to-[#000080]/30"></div>
        </div>

        <div class="relative z-10 bg-white/5 border border-white/10 w-full max-w-md p-10 md:p-14 rounded-[40px] shadow-2xl backdrop-blur-md space-y-8">
            <div class="text-center">
                <div class="inline-flex p-4 rounded-3xl bg-white/10 mb-4">
                    <i data-lucide="compass" class="w-10 h-10 text-blue-300"></i>
                </div>
                <h1 class="text-3xl font-black text-white tracking-tight">CITTE LSG & Org</h1>
                <p class="text-blue-200/60 text-[10px] uppercase tracking-[0.2em] font-bold">Automated System</p>
            </div>

            <div id="form-login" class="space-y-4">
                <input type="email" id="login-email" placeholder="Email Address" class="w-full px-6 py-4 bg-white/10 text-white placeholder:text-slate-400 rounded-2xl border border-white/10 outline-none focus:ring-2 focus:ring-blue-400 transition-all">
                <input type="password" id="login-password" placeholder="Password" class="w-full px-6 py-4 bg-white/10 text-white placeholder:text-slate-400 rounded-2xl border border-white/10 outline-none focus:ring-2 focus:ring-blue-400 transition-all">
                <button id="btn-login-exec" class="w-full bg-white text-[#000080] py-4 rounded-2xl font-black hover:bg-blue-50 active:scale-95 transition-all shadow-xl">Sign In</button>
            </div>

            <div id="form-signup" class="space-y-4 hidden">
                <input type="text" id="signup-name" placeholder="Officer Full Name" class="w-full px-6 py-4 bg-white/10 text-white placeholder:text-slate-400 rounded-2xl border border-white/10 outline-none focus:ring-2 focus:ring-blue-400 transition-all">
                <input type="email" id="signup-email" placeholder="Org Email" class="w-full px-6 py-4 bg-white/10 text-white placeholder:text-slate-400 rounded-2xl border border-white/10 outline-none focus:ring-2 focus:ring-blue-400 transition-all">
                <input type="password" id="signup-password" placeholder="Create Password" class="w-full px-6 py-4 bg-white/10 text-white placeholder:text-slate-400 rounded-2xl border border-white/10 outline-none focus:ring-2 focus:ring-blue-400 transition-all">
                <select id="signup-org" class="w-full px-6 py-4 bg-white/10 text-slate-300 rounded-2xl border border-white/10 outline-none focus:ring-2 focus:ring-blue-400 appearance-none">
                    <option value="" disabled selected class="text-slate-900">Select Organization</option>
                    <option value="HERO Organization" class="text-slate-900">HERO (Education)</option>
                    <option value="PSTTS Organization" class="text-slate-900">PSTTS (Technology)</option>
                    <option value="CITTE LSG" class="text-slate-900">CITTE LSG (Student Govt)</option>
                </select>
                <button id="btn-signup-exec" class="w-full bg-blue-500 text-white py-4 rounded-2xl font-black hover:bg-blue-400 active:scale-95 transition-all">Create Account</button>
            </div>

            <p id="auth-feedback" class="text-center text-xs text-red-300 font-medium hidden"></p>

            <div class="text-center pt-6 border-t border-white/10">
                <span class="text-slate-400 text-sm" id="toggle-text">New officer?</span>
                <button onclick="toggleAuthForm()" id="btn-auth-toggle" class="text-white text-sm font-bold hover:underline ml-1">Sign up now.</button>
            </div>
        </div>
    </div>

    <div id="app" class="hidden flex min-h-screen">
        <aside class="fixed inset-y-0 left-0 z-50 w-64 bg-[#000080] text-white flex flex-col shadow-2xl transition-transform lg:translate-x-0">
            <div class="p-8 text-xl font-black border-b border-blue-900 flex items-center gap-3 italic tracking-tighter">
                <i data-lucide="compass" class="text-blue-300"></i> LSG & ORG
            </div>
            
            <nav class="flex-1 p-4 space-y-2 mt-4">
                <button onclick="window.showSection('dashboard')" class="nav-item w-full flex items-center p-4 rounded-2xl hover:bg-white/10 transition-all gap-4">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </button>
                <button onclick="window.showSection('students')" class="nav-item w-full flex items-center p-4 rounded-2xl hover:bg-white/10 transition-all gap-4">
                    <i data-lucide="users" class="w-5 h-5"></i> Students
                </button>
                <button onclick="window.showSection('events')" class="nav-item w-full flex items-center p-4 rounded-2xl hover:bg-white/10 transition-all gap-4">
                    <i data-lucide="calendar-range" class="w-5 h-5"></i> Events
                </button>
                <button onclick="window.showSection('finance')" class="nav-item w-full flex items-center p-4 rounded-2xl hover:bg-white/10 transition-all gap-4">
                    <i data-lucide="wallet" class="w-5 h-5"></i> Finance
                </button>
                <button onclick="window.showSection('attendance')" class="nav-item w-full flex items-center p-4 rounded-2xl hover:bg-white/10 transition-all gap-4">
                    <i data-lucide="qr-code" class="w-5 h-5"></i> Attendance
                </button>
            </nav>

            <div class="p-6 border-t border-blue-900">
                <div class="bg-blue-900/40 p-4 rounded-2xl mb-4">
                    <p class="text-[10px] text-blue-300 font-black uppercase tracking-widest mb-1">Organization</p>
                    <p id="display-org-name" class="text-sm font-bold truncate">Loading...</p>
                </div>
                <button id="btn-logout" class="w-full flex items-center p-2 text-red-300 hover:text-red-100 font-bold text-xs gap-2">
                    <i data-lucide="log-out" class="w-4 h-4"></i> LOGOUT
                </button>
            </div>
        </aside>

        <main class="flex-1 lg:ml-64 bg-slate-50 min-h-screen">
            <header class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-8 sticky top-0 z-40">
                <h2 id="current-page-title" class="text-2xl font-black text-[#000080]">Dashboard</h2>
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <p id="user-full-name" class="text-sm font-bold">Admin User</p>
                        <p class="text-[10px] text-slate-400 font-bold uppercase">Officer</p>
                    </div>
                    <img id="user-avatar" src="https://ui-avatars.com/api/?name=Admin&background=000080&color=fff" class="w-10 h-10 rounded-full border-2 border-white shadow-sm">
                </div>
            </header>

            <div id="content-viewport" class="p-8">
                <div id="mod-dashboard" class="module-container"></div>
                <div id="mod-students" class="module-container"></div>
                <div id="mod-events" class="module-container"></div>
                <div id="mod-finance" class="module-container"></div>
                <div id="mod-attendance" class="module-container"></div>
            </div>
        </main>
    </div>

    <script type="module" src="./src/js/main.js"></script>
    <script>
        function toggleAuthForm() {
            const loginForm = document.getElementById('form-login');
            const signupForm = document.getElementById('form-signup');
            const toggleText = document.getElementById('toggle-text');
            const toggleBtn = document.getElementById('btn-auth-toggle');

            if (signupForm.classList.contains('hidden')) {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                toggleText.innerText = "Already an officer?";
                toggleBtn.innerText = "Sign in now.";
            } else {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                toggleText.innerText = "New officer?";
                toggleBtn.innerText = "Sign up now.";
            }
        }
    </script>
</body>
</html>
