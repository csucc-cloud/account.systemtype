name: Deploy Organization System

on:
  push:
    branches: [ "main" ]

# We need 'write' permissions so GitHub can save the lock file back to your repo
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate and Commit Lock File
        run: |
          # Only run this if the file doesn't exist yet
          if [ ! -f package-lock.json ]; then
            npm install --package-lock-only
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add package-lock.json
            git commit -m "chore: auto-generate package-lock.json"
            git push
          fi

      - name: Install dependencies
        run: npm install

      - name: Build Scrambled Project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
