<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Org Support Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif;
            background: #f8fafc; /* Clean, professional slate */
        }
        
        /* Subtle entrance for a premium feel */
        .portal-card {
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Glass effect for the input fields */
        .glass-input {
            background: #f1f5f9 !important;
            border: 2px solid transparent !important;
            transition: all 0.2s ease;
        }

        .glass-input:focus {
            background: #ffffff !important;
            border-color: #3b82f6 !important;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div id="inquiry-form-container" class="portal-card w-full max-w-md bg-white rounded-[2.5rem] shadow-[0_25px_50px_-12px_rgba(0,0,0,0.08)] p-8 border border-slate-100">
        <div class="flex flex-col items-center justify-center py-20">
            <div class="w-12 h-12 border-[3px] border-slate-100 border-t-blue-600 rounded-full animate-spin"></div>
            <p class="mt-4 text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">Syncing Org Records...</p>
        </div>
    </div>

    <script type="module">
        import { PublicInquiryModule } from './src/js/PublicInquiryModule.js';
        
        // Your Master Org UUID
        const GENERAL_ID = '3c435a81-16c0-4472-92fd-3ff5949fc9ed'; 

        const orgConfig = {
            title: "Org <span class='text-blue-600'>Support</span>",
            subtitle: "LSG & Organization Helpdesk",
            // For the Treasurer/Auditor: Managing the Money
            q1: "Financial/Fees (e.g. Membership Fee, Trust Fund, Payment Status)",
            // For the Secretary: Managing the Papers
            q2: "Compliance/Docs (e.g. COR Verification, Activity Permits, Org ID)",
            // For the President/PRO: Managing the Students
            q3: "General/Welfare (e.g. Event Suggestions, Grievances, Clearance)",
            buttonText: "Send to Organization"
        };

        try {
            PublicInquiryModule.init(GENERAL_ID, orgConfig);
        } catch (error) {
            console.error("Portal Error:", error);
        }
    </script>
</body>
</html>
